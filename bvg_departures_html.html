<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BVG Abfahrtszeiten</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #F7B500 0%, #F7B500 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1023;
            text-align: center;
            margin-bottom: 10px;
        }
        .update-time {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .station {
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            background: #fafafa;
        }
        .station-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .station-name::before {
            content: "📍";
            margin-right: 10px;
        }
        .departure {
            display: grid;
            grid-template-columns: 60px 1fr auto;
            gap: 15px;
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #F7B500;
        }
        .line {
            font-weight: bold;
            font-size: 16px;
            color: #333;
        }
        .direction {
            font-weight: bold;
            color: #333;
        }
        .time {
            font-weight: bold;
            color: #333;
            white-space: nowrap;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #333;
            font-size: 18px;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .no-departures {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 15px;
            }
            .departure {
                grid-template-columns: 50px 1fr;
                gap: 10px;
            }
            .time {
                grid-column: 2;
                text-align: right;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚇 BVG Abfahrtszeiten</h1>
        <div class="update-time" id="update-time">Lädt...</div>
        <div id="output" class="loading">Starte Programm...</div>
    </div>

    <script>
        const API_BASE = "https://v6.bvg.transport.rest";

        class Station {
            constructor(name, id, filterLines = [], minMinutesUntilDeparture = 0) {
                this.name = name;
                this.id = id;
                this.filterLines = filterLines;
                this.minMinutesUntilDeparture = minMinutesUntilDeparture;
            }
        }

        async function findStation(query) {
            try {
                const url = `${API_BASE}/locations?query=${encodeURIComponent(query)}&results=1`;
                const response = await fetch(url);
                const data = await response.json();
                if (data && data.length > 0) {
                    return data[0];
                }
                return null;
            } catch (error) {
                console.error(`Error searching: ${error}`);
                return null;
            }
        }

        function formatDepartureTime(whenStr, delay) {
            if (!whenStr) return "Unbekannt";

            try {
                const departureTime = new Date(whenStr);
                const now = new Date();
                const timeUntil = (departureTime - now) / 1000; // seconds

                let delayInfo = "";
                if (delay && delay > 0) {
                    delayInfo = ` (+${Math.floor(delay / 60)} min)`;
                }

                if (timeUntil < 60) {
                    return `Jetzt${delayInfo}`;
                } else if (timeUntil < 3600) {
                    return `in ${Math.floor(timeUntil / 60)} min${delayInfo}`;
                } else {
                    const hours = departureTime.getHours().toString().padStart(2, '0');
                    const minutes = departureTime.getMinutes().toString().padStart(2, '0');
                    return `${hours}:${minutes} Uhr${delayInfo}`;
                }
            } catch (error) {
                return whenStr;
            }
        }

        async function showDepartures(station) {
            try {
                let whenParam = "";
                if (station.minMinutesUntilDeparture > 0) {
                    const startTime = new Date();
                    startTime.setMinutes(startTime.getMinutes() + station.minMinutesUntilDeparture);
                    whenParam = `&when=${encodeURIComponent(startTime.toISOString())}`;
                }

                const url = `${API_BASE}/stops/${station.id}/departures?duration=60&results=10${whenParam}`;
                const response = await fetch(url);
                const data = await response.json();

                const departures = data.departures || [];

                let html = `<div class="station"><div class="station-name">${station.name}</div>`;

                if (departures.length === 0) {
                    html += '<div class="no-departures">Keine Abfahrten gefunden</div>';
                } else {
                    const filtered = [];
                    for (const dep of departures) {
                        if (station.filterLines.length > 0) {
                            const lineName = dep.line?.name || '';
                            if (!station.filterLines.includes(lineName)) {
                                continue;
                            }
                        }
                        filtered.push(dep);
                        if (filtered.length >= 8) break;
                    }

                    if (filtered.length === 0) {
                        html += '<div class="no-departures">Keine Abfahrten für die ausgewählten Linien</div>';
                    } else {
                        for (const dep of filtered) {
                            const lineName = dep.line?.name || '?';
                            const direction = dep.direction || 'Unbekannt';
                            const when = formatDepartureTime(dep.when, dep.delay);

                            html += `
                                <div class="departure">
                                    <div class="line">${lineName}</div>
                                    <div class="direction">→ ${direction}</div>
                                    <div class="time">${when}</div>
                                </div>
                            `;
                        }
                    }
                }

                html += '</div>';
                return html;
            } catch (error) {
                return `<div class="error">❌ Fehler beim Abrufen der Daten für ${station.name}: ${error}</div>`;
            }
        }

        async function main() {
            const output = document.getElementById('output');
            const updateTime = document.getElementById('update-time');

            try {
                output.innerHTML = '<div class="loading">Suche Haltestellen...</div>';

                const stations = [];

                const sonnenallee = await findStation("S Sonnenallee");
                if (sonnenallee) {
                    stations.push(new Station(
                        sonnenallee.name,
                        sonnenallee.id,
                        ['S41', 'S42'],
                        8
                    ));
                }

                const neukoelln = await findStation("Neukölln");
                if (neukoelln) {
                    stations.push(new Station(
                        neukoelln.name,
                        neukoelln.id,
                        ['U7'],
                        8
                    ));
                }

                const bruecke = await findStation("Neuköllnische Brücke");
                if (bruecke) {
                    stations.push(new Station(
                        bruecke.name,
                        bruecke.id,
                        [],
                        0
                    ));
                }

                if (stations.length === 0) {
                    output.innerHTML = '<div class="error">Keine Haltestellen gefunden</div>';
                    return;
                }

                async function updateDepartures() {
                    try {
                        let html = "";
                        for (const station of stations) {
                            html += await showDepartures(station);
                        }

                        output.innerHTML = html;
                        const now = new Date();
                        const timeStr = now.toLocaleTimeString('de-DE');
                        updateTime.innerHTML = `Letzte Aktualisierung: ${timeStr} - Nächste in 15 Sekunden`;
                    } catch (error) {
                        output.innerHTML = `<div class="error">Fehler: ${error}</div>`;
                    }
                }

                // Initial load
                await updateDepartures();

                // Update every 15 seconds
                setInterval(updateDepartures, 15000);
            } catch (error) {
                output.innerHTML = `<div class="error">Kritischer Fehler: ${error}</div>`;
            }
        }

        // Start when page loads
        window.addEventListener('DOMContentLoaded', main);
    </script>
</body>
</html>
